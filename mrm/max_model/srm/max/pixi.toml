[workspace]
authors = ["Benjamin Badger <blbadger10@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "max"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
vector_addition = "python3 max_vec_attition.py"
addition = "python test_addition.py"
test_addition = "pytest test_addition.py"
test = "python test.py"
module_test = "python module_test.py"
srm_test = "python srm.py"
minimal_srm = "python minimal_srm.py"
embedding_test = "python embedding_test.py"
reference_srm = "python reference_srm.py"

[dependencies]
pytest = ">=9.0.2,<10"
pytorch = ">=2.10.0,<3"
modular = "26.2.*"
pathlib = ">=1.0.1,<2"
